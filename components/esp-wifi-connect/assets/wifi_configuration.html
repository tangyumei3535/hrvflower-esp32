<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HRV Emotion Flower — Wi-Fi</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #14141c;
      --accent: #ff6d00;
      --accent2: #f48fb1;
      --text: #e8e8ec;
      --muted: #8a8a96;
      --border: #2a2a36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a1020 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px 16px 32px;
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    .hero {
      text-align: center;
      margin-bottom: 24px;
    }
    .flower {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, var(--accent2), var(--accent));
      box-shadow: 0 0 40px rgba(255, 109, 0, 0.35);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }
    .intro {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 14px;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .ap-list {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 14px;
    }
    .ap-item {
      display: block;
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid transparent;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .ap-item:hover { border-color: var(--accent); }
    .ap-item .rssi { float: right; color: var(--muted); font-size: 0.8rem; }
    .scan-hint { font-size: 0.85rem; color: var(--muted); }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #ff9100);
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }
    .msg.err { color: #ff6b6b; }
    .msg.ok { color: #69db7c; }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="flower" aria-hidden="true"></div>
      <h1>HRV Emotion Flower</h1>
      <p class="intro">
        This display shows your heart-rate variability as a blooming flower, plus weather and time from your phone.
        Connect it to your home Wi-Fi so it can receive updates over the cloud.
      </p>
    </div>

    <form id="wifiForm" class="card">
      <label for="ssid">Wi-Fi network</label>
      <div class="ap-list" id="apList"><p class="scan-hint">Scanning…</p></div>
      <input type="text" id="ssid" name="ssid" placeholder="SSID" required maxlength="32" autocomplete="off">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Leave empty if open" maxlength="64">

      <button type="submit" id="submitBtn">Connect</button>
      <p class="msg" id="statusMsg"></p>
    </form>

    <footer>hrvflower-esp32 · Captive portal may open automatically on mobile</footer>
  </div>

  <script>
    const apList = document.getElementById('apList');
    const ssidInput = document.getElementById('ssid');
    const form = document.getElementById('wifiForm');
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function loadScan() {
      fetch('/scan')
        .then(r => r.json())
        .then(data => {
          if (!data.aps || data.aps.length === 0) {
            apList.innerHTML = '<p class="scan-hint">No networks found. Enter SSID manually.</p>';
            return;
          }
          apList.innerHTML = '';
          data.aps.sort((a, b) => b.rssi - a.rssi);
          data.aps.forEach(ap => {
            const el = document.createElement('a');
            el.className = 'ap-item';
            el.href = '#';
            el.innerHTML = esc(ap.ssid) + '<span class="rssi">' + ap.rssi + ' dBm</span>';
            el.onclick = (e) => {
              e.preventDefault();
              ssidInput.value = ap.ssid;
            };
            apList.appendChild(el);
          });
        })
        .catch(() => {
          apList.innerHTML = '<p class="scan-hint">Scan failed. Enter SSID manually.</p>';
        });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const ssid = ssidInput.value.trim();
      if (!ssid) return;
      submitBtn.disabled = true;
      statusMsg.className = 'msg';
      statusMsg.textContent = 'Connecting…';

      fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ssid: ssid,
          password: document.getElementById('password').value
        })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            statusMsg.className = 'msg ok';
            statusMsg.textContent = 'Connected! Finishing setup…';
            window.location.href = '/done.html';
          } else {
            statusMsg.className = 'msg err';
            statusMsg.textContent = data.error || 'Connection failed';
            submitBtn.disabled = false;
          }
        })
        .catch(() => {
          statusMsg.className = 'msg err';
          statusMsg.textContent = 'Request failed';
          submitBtn.disabled = false;
        });
    });

    loadScan();
    setInterval(loadScan, 8000);
  </script>
</body>
</html>
