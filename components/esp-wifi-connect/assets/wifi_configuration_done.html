<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connected</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8ec;
    }
    .box { text-align: center; padding: 24px; }
    .dot {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #69db7c, #2e7d32);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    p { margin: 0; font-size: 1.1rem; }
    .sub { margin-top: 8px; color: #8a8a96; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="dot"></div>
    <p>Wi-Fi connected</p>
    <p class="sub">The flower display will start shortly.</p>
  </div>
  <script>
    setTimeout(function() {
      fetch('/exit', { method: 'POST' }).catch(function() {});
    }, 1000);
  </script>
</body>
</html>
